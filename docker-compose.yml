services:
  adilanet-dashboard:
    # ---------------------------------------------------------------
    # OPSI A (AKTIF): tarik image yang dibangun otomatis oleh GitHub Actions
    # (GHCR). Pastikan package "smarhome" di GitHub sudah di-set PUBLIC.
    # ---------------------------------------------------------------
    image: ghcr.io/adilacell011-cell/smarhome:latest

    # ---------------------------------------------------------------
    # OPSI B: kalau ingin Dockge build sendiri dari repo (tanpa GHCR),
    # matikan baris "image:" di atas, lalu aktifkan blok berikut:
    # ---------------------------------------------------------------
    # build:
    #   context: https://github.com/adilacell011-cell/Smarhome.git#main

    container_name: adilanet-dashboard
    restart: unless-stopped
    init: true

    # Mode jaringan host: agar container bisa menjangkau perangkat LAN
    # secara langsung (lampu WiZ via UDP, CCTV/ONVIF, Android TV via ADB).
    # Aplikasi berjalan di port 5000 -> akses: http://IP-SERVER-ANDA:5000
    network_mode: host

    environment:
      - PORT=5000
      # - GEMINI_API_KEY=isi_kalau_pakai_fitur_AI

    volumes:
      - ./config:/app/config   # akun login + setelan perangkat (WAJIB disimpan)
      - ./data:/app/data       # rekaman CCTV, thumbnail, database lokal

    # Catatan: dengan network_mode host, pemetaan "ports:" diabaikan.
    # Jika server Anda TIDAK mendukung host networking, hapus baris
    # "network_mode: host" di atas dan pakai pemetaan port berikut:
    # ports:
    #   - "5000:5000"
